name: CI

on:
  push:

jobs:
  style_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install black
        run: pip install black

      # --check makes the job fail if any file would be reformatted
      - name: Run black in check mode
        run: black --check .

  test:
    runs-on: ubuntu-latest
    needs: style_check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest coverage
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install coverage
        run: pip install coverage

      - name: Install pytest, numpy, matplotlib
        run: pip install pytest numpy matplotlib unittest

      - name: Run tests and collect coverage
        run: |
          coverage run -m pytest
          # .coverage file is created in the repo root

      - name: Upload coverage data (.coverage)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: .coverage
          retention-days: 1   # keep intermediate coverage for 1 day [web:6][web:10][web:14]

  coverage_report:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          name: coverage-data
          path: .

      - name: Install coverage
        run: pip install coverage

      - name: Generate coverage report and XML
        run: |
          coverage report        # human‑readable report in job log
          coverage xml -o coverage.xml

      - name: Upload XML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14    # keep XML for 14 days [web:6][web:10][web:14]
